<!DOCTYPE html>
<html lang="ru">
<head>    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новость | РАКУРС</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #1a1a1a; --text-color: #f0f0f0; --accent-color: #e09f7d; --card-bg: #222222; --border-color: #333333; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); min-height: 100vh; padding-top: 60px; }
        #article-container { max-width: 800px; margin: 40px auto; padding: 30px; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border-color); }
        
        .video-container { width: 100%; position: relative; border-radius: 8px; background-color: black; overflow: hidden; aspect-ratio: 16/9; }
        .video { width: 100%; height: 100%; }
        .controls { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); display: flex; align-items: center; padding: 0 15px; opacity: 0; transition: opacity 0.3s; justify-content: space-between; }
        .video-container:hover .controls { opacity: 1; }
        .controls button { background: transparent; border: none; color: var(--accent-color); font-size: 18px; cursor: pointer; padding: 5px; }
        
        .left { display: flex; align-items: center; gap: 15px; }
        .playback-line { flex-grow: 1; height: 4px; background-color: #444; cursor: pointer; margin: 0 10px; }
        .progress-bar { height: 100%; width: 0; background-color: var(--accent-color); }
        .video-timer { font-size: 12px; color: #fff; white-space: nowrap; }
        
        .right { display: flex; align-items: center; gap: 10px; }
        .volume { width: 60px; height: 4px; accent-color: var(--accent-color); cursor: pointer; }
    </style>
</head>
<body>    <main><div id="article-container">Загрузка...</div></main>
    <script>
        async function loadSingleArticle() {
            const container = document.getElementById('article-container');
            const params = new URLSearchParams(window.location.search);
            const response = await fetch('news.json');
            const data = await response.json();
            const news = data.find(n => n.id == params.get('id'));

            if (news && news.videoUrl) {
                container.innerHTML = `
                    <div class="video-container" id="vc">
                        <video class="video" src="${news.videoUrl}"></video>
                        <div class="controls">
                            <div class="left">
                                <button class="play-pause"><i class="fa-solid fa-play"></i></button>
                                <div class="playback-line"><div class="progress-bar"></div></div>
                                <div class="video-timer"><span class="current-time">00:00</span> / <span class="max-duration">00:00</span></div>
                            </div>
                            <div class="right">
                                <button class="mute"><i class="fa-solid fa-volume-high"></i></button>
                                <input type="range" class="volume" min="0" max="1" step="0.1" value="1">
                                <button class="fs-btn"><i class="fa-solid fa-expand"></i></button></div>
                        </div>
                    </div><h1>${news.title}</h1>`;

                const video = container.querySelector(".video"), playpause = container.querySelector(".play-pause"),
                      volume = container.querySelector(".volume"), mutebtn = container.querySelector(".mute"),
                      progressBar = container.querySelector(".progress-bar"), line = container.querySelector(".playback-line"),
                      curr = container.querySelector(".current-time"), max = container.querySelector(".max-duration");

                playpause.onclick = () => { video.paused ? video.play() : video.pause(); };
                video.onplay = () => playpause.innerHTML = '<i class="fa-solid fa-pause"></i>';
                video.onpause = () => playpause.innerHTML = '<i class="fa-solid fa-play"></i>';video.ontimeupdate = () => {
                    progressBar.style.width = (video.currentTime / video.duration) * 100 + "%";
                    curr.innerText = new Date(video.currentTime * 1000).toISOString().substr(14, 5);
                    max.innerText = new Date(video.duration * 1000).toISOString().substr(14, 5);
                };
                line.onclick = (e) => video.currentTime = (e.offsetX / line.offsetWidth) * video.duration;
                mutebtn.onclick = () => { video.muted = !video.muted; mutebtn.innerHTML = `<i class="fa-solid fa-volume-${video.muted ? 'xmark' : 'high'}"></i>`; };
                volume.oninput = () => video.volume = volume.value;
                container.querySelector(".fs-btn").onclick = () => !document.fullscreenElement ? container.requestFullscreen() : document.exitFullscreen();
            }
        }
        loadSingleArticle();
    </script>
</body>
</html>
