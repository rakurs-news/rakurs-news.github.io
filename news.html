<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Новость</title>

    <script type="application/ld+json" id="schema-data">
        {
            "@context": "https://schema.org",
            "@type": "NewsArticle",
            "headline": "",
            "datePublished": "",
            "author": {"@type": "Organization", "name": "Ракурс NEWS"},
            "publisher": {"@type": "Organization", "name": "Ракурс NEWS"}
        }
    </script>

    <style>
        * { box-sizing: border-box; }
        body { 
            background: #121212; 
            color: #e0e0e0; 
            font-family: sans-serif; 
            line-height: 1.6; 
            padding: 20px; 
            margin: 0;
        }

        .back-link { 
            display: inline-block; 
            color: #888; 
            text-decoration: underline; 
            margin-bottom: 30px; 
            font-size: 14px;
        }
        .back-link:hover { color: #ff9800; }

        h1 { 
            color: #ff9800; 
            margin: 0 0 20px 0; 
            font-size: 24px; 
            line-height: 1.2;
        }

        .meta-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            color: #ff9800;
            font-size: 13px;
            margin-bottom: 25px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        #article-body { margin: 0; }
        #article-body p {
            margin: 0 0 15px 0;
            text-align: left;
        }

        /* СТИЛЬ КНОПКИ "НА ГЛАВНУЮ" */
        .main-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            background-color: transparent;
            border: 2px solid #ff9800;
            color: #ff9800;
            padding: 15px 20px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 40px;
            border-radius: 4px;
        }
        .main-btn:hover {
            background-color: #ff9800;
            color: #121212;
        }

        #loading { 
            text-align: center; 
            margin-top: 50px; 
            color: #ff9800; 
            font-size: 18px;
        }

        .error-box { 
            color: red; 
            padding: 20px; 
            background: #222; 
            border-radius: 5px; 
            text-align: center;
            margin-top: 30px;
            border: 1px solid red;
        }

        #debug-info {
            background: #1a1a1a;
            padding: 15px;
            color: #aaa;
            font-family: monospace;
            margin-top: 20px;
            border-left: 4px solid #ff9800;
            display: none;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Вернуться к ленте новостей</a>
    
    <div id="loading">Загрузка новости...</div>
    
    <article id="content-area" style="display: none;">
        <h1 id="article-title"></h1>
        
        <div class="meta-row">
            <span id="article-date"></span>
            <span id="article-category"></span>
        </div>
        
        <div id="article-body"></div>

        <!-- КНОПКА "НА ГЛАВНУЮ" -->
        <a href="index.html" class="main-btn">НА ГЛАВНУЮ</a>
    </article>

    <div id="error" class="error-box" style="display:none;"></div>
    <div id="debug-info"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const newsId = urlParams.get('id'); 

        if (!newsId) {
            document.getElementById('loading').innerText = "Ошибка: ID новости не передан в ссылке.";
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').innerText = "Ссылка должна выглядеть как: .../news.html?id=iran-obnulit-starlink...";
        } else {
            console.log('Ищем новость с ID:', newsId);
            loadAndShowNews(newsId);
        }

        async function loadAndShowNews(id) {
            try {
                const response = await fetch('news.json');
                
                if (!response.ok) {
                    throw new Error('Файл news.json не найден (статус ' + response.status + ')');
                }
                
                const allNews = await response.json();
                const news = allNews.find(n => n.id === id);

                if (news) {
                    renderNews(news);
                } else {
                    const availableIds = allNews.map(n => n.id).join('\n- ');
                    const msg = `Новость с ID "${id}" не найдена.\n\nДоступные ID в файле:\n- ${availableIds}`;
                    throw new Error(msg);
                }
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                const errDiv = document.getElementById('error');
                errDiv.style.display = 'block';
                errDiv.innerText = e.message;
                
                const debugDiv = document.getElementById('debug-info');
                debugDiv.style.display = 'block';
                debugDiv.innerText = 'Техническая информация:\nЗапрошен ID: ' + (newsId || 'нет') + '\nОшибка JS: ' + e.toString();
                
                console.error(e);
            }
        }

        function renderNews(item) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content-area').style.display = 'block';

            document.getElementById('article-title').innerText = item.title;
            document.getElementById('page-title').innerText = item.title + " — Ракурс NEWS";

            document.getElementById('article-date').innerText = item.date;
            document.getElementById('article-category').innerText = item.category;

            const paragraphs = item.content.split('\n\n').map(p => `<p>${p}</p>`).join('');
            document.getElementById('article-body').innerHTML = paragraphs;

            const script = document.getElementById('schema-data');
            const json = JSON.parse(script.innerText);
            json.headline = item.title;
            json.datePublished = item.date; 
            script.innerText = JSON.stringify(json);
        }
    </script>
</body>
</html>
