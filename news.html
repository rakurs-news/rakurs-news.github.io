<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новость | РАКУРС</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #f0f0f0;
            --accent-color: #e09f7d;--card-bg: #222222;
            --menu-bg: #2c2c2c;
            --footer-height: 80px;
            --border-color: #333333;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;display: flex;
            flex-direction: column;
            padding-top: 60px;        }

        h1, h2, h3, .logo, .nav-link, .card-title, .site-logo-img, #siteSearch, .category-tag, .author, .publish-date, .publish-time, .hint-text, .copyright, .social-icon, .play-button, .volume-button, .load-more-btn {
            font-family: 'Montserrat', sans-serif;
        }

        p, .meta-info span, .author, .publish-date, .publish-time, .hint-text, .copyright, .content-text {
            font-family: 'Merriweather', serif;
            line-height: 1.6;
        }

        header {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%;
            height: 60px; 
            background-color: rgba(26,26, 26, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;justify-content: flex-start;
            align-items: center;
            padding: 0 15px; 
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header .logo-container {
            display: flex;
            align-items: center;
        }

        header .logo-container img {
            height: 30px;
            margin-right: 10px;}

        header h1 { 
            color: var(--accent-color); 
            margin: 0;font-weight: 700;
            letter-spacing: 1px;
            font-size: 28px;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            color: #888;            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-btn {
            display: block;
            padding: 10px 15px;
            max-width: 220px;       
            width: 100%;box-sizing: border-box;
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 30px auto 40px;
            text-align: center;
        }
        
        .back-btn:hover, .back-btn:focus {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(224, 159, 125, 0.6);
        }

        #article-container {
            max-width: 800px;margin: 40px auto;
            padding: 30px;
            background: var(--card-bg); 
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 04px 10px rgba(0,0,0,0.3);
        }

        #article-container:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        #article-container img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 25px;
            display: block;
        }

        #article-container h1 {
            color: var(--text-color);
            font-size: 2.2rem;
            line-height: 1.1;
            margin: 0 0 20px0;
        }

        .meta-info {
            color: #aaa;
            font-size: 0.95rem;
            margin-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }        .meta-info span { margin-right: 15px; }

        .content-text {
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--text-color);
            white-space: pre-wrap;
        }
        
        .content-text p { margin-bottom: 1.5rem; }

        #article-container .content-text p:first-child { margin-top: 0; margin-bottom: 0; }        @media (max-width: 600px) {
            #article-container { margin: 20px; padding: 20px; }
            #article-container h1 { font-size: 1.8rem; }
            .back-btn { max-width: 100%; }
        }

        .video-container {
            position: relative; 
            width: 100%;
            margin-bottom: 20px;
            border-radius: 8px;            overflow: hidden; 
            background-color: #000; 
            cursor: pointer; 
            display: flex; 
            justify-content: center;
            align-items: center;
            max-height: 500px;
        }

        .video-container video {
            display: block; 
            width: 100%;
            height: auto; 
            max-height: 500px; 
            object-fit: cover; 
            background-color: #000; 
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px; 
            height: 70px;
            background-color: var(--card-bg); 
            border-radius: 50%;
            display: flex; 
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid var(--accent-color); 
            box-shadow: 0 0 15px rgba(224, 159, 125, 0.4);
            z-index: 10;
        }

        .play-button:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 8px25px rgba(224, 159, 125, 0.6);
        }

        .play-icon {
            width: 0; 
            height: 0; 
            border-top: 15px solid transparent; 
            border-bottom: 15px solid transparent; 
            border-left: 25px solid var(--accent-color); 
            margin-left: 5px; 
        }
        
        .volume-button {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background-color: rgba(44,44, 44, 0.7);
            border-radius: 50%;display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(224, 159, 125, 0.5);
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .volume-button:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(224, 159, 125, 0.4);
        }

        .volume-icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: url('https://raw.githubusercontent.com/CAPMAT-RU/bez-shutok/main/images/IMG_20260704_133508.png') no-repeat center center;
            background-size: 70% 70%;        }

        :focus { outline: none; }
        .back-btn:focus, a:focus, button:focus, input:focus, select:focus, textarea:focus {
            box-shadow: 00 0 2px var(--accent-color), 0 0 0 5px rgba(224, 159, 125, 0.5); 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container"><img src="https://raw.github.com/CAPMAT-RU/rakurs-news-ru/main/images/IMG_20260706_221334.png" alt="Логотип РАКУРС">
            <h1>РАКУРС</h1>
        </div>
    </header>

    <main>
        <div id="article-container">
            <p style="text-align: center; color: #666;">Загрузка статьи...</p>
        </div>
    </main>

    <footer>
        <p>©2026 РАКУРС</p>
    </footer>

    <script>
    function setupVideoPlayer(container) {
        const videoContainer = container.querySelector('.video-container');
        if (!videoContainer) return;

        const videoElement = videoContainer.querySelector('.video-element');
        const playButton = videoContainer.querySelector('.play-button');
        const volumeButton = videoContainer.querySelector('.volume-button');

        // ПРИНУДИТЕЛЬНОЕ ОТОБРАЖЕНИЕ
        videoElement.style.display = 'block';
        playButton.style.display = 'flex';
        volumeButton.style.display = 'flex';

        // Клик по контейнеру (Play/Pause)
        videoContainer.addEventListener('click', () => {
            if (videoElement.paused) {
                videoElement.play();
                playButton.style.display = 'none';
            } else {
                videoElement.pause();
                playButton.style.display = 'flex';
            }
        });

        // Клик по кнопке Play (отдельно)
        playButton.addEventListener('click', (e) => {
            e.stopPropagation();
            videoElement.play();
            playButton.style.display = 'none';
        });

        // Клик по кнопке Volume
        volumeButton.addEventListener('click', (e) => {
            e.stopPropagation();
            videoElement.muted = !videoElement.muted;
        });

        videoElement.addEventListener('ended', () => {
            playButton.style.display = 'flex';
        });
    }

    async function loadSingleArticle() {
        const params = new URLSearchParams(window.location.search);
        const newsId = params.get('id');
        const container = document.getElementById('article-container');if (!newsId) return;

        try {
            const response = await fetch('news.json');            const data = await response.json();
            const news = data.find(n => n.id == newsId);

            if (news) {
                // Если видео есть, вставляем HTML
                let mediaHtml = news.videoUrl 
                    ? `<div class="video-container" style="display: flex;">
                            <video class="video-element" src="${news.videoUrl}" style="width: 100%; height: auto;"></video>
                            <div class="play-button"><div class="play-icon"></div></div><div class="volume-button"><div class="volume-icon"></div></div>
                       </div>`
                    : `<img src="${news.image}" alt="${news.title}">`;

                container.innerHTML = `
                    ${mediaHtml}
                    <h1>${news.title}</h1>
                    <div class="meta-info"><span>Рубрика: ${news.category}</span></div>                    <div class="content-text">${news.content}</div>
                    <a href="index.html" class="back-btn">← На Главную</a>
                `;
                
                // Инициализируем плеер
                setupVideoPlayer(container);
            }
        } catch (err) {
            console.error("Ошибка:", err);
        }    }
    loadSingleArticle();
</script>
</body>
</html>
