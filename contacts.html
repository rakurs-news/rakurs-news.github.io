<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контакты — РАКУРС NEWS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
        --bg-color: #1a1a1a;
        --text-color: #f0f0f0;
        --accent-color: #e09f7d;
        --card-bg: #222222;        
        --border-color: #333333;
    }body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Montserrat', sans-serif;
        margin: 0;
        min-height: 100vh;
    }

    .contact-container {
        max-width: 600px;
        margin: 100px auto 50px auto;padding: 20px;
    }

    .logo-header {
        text-align: center;        margin-bottom: 20px;
    }

    .logo-header img {
        max-width: 150px;
        height: auto;
    }

    h1 {        color: var(--accent-color);
        margin-bottom: 30px;
        text-align: center;
    }

    .contact-card {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 40px;
        text-align: center;    
    }

    .contact-item {
        margin: 25px 0;
    }

    .contact-label {
        color: var(--accent-color);
        font-weight: bold;
        display: block;
        margin-bottom: 8px;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 1px;
    }

    .contact-value {
        font-family: 'Merriweather', serif;
        font-size: 18px;
    }

    .contact-value a {
        color: var(--text-color);text-decoration: none;
        border-bottom: 1px solid var(--accent-color);transition: color 0.3s;
    }

    .contact-value a:hover {color: var(--accent-color);
    }
  </style>
</head>
<body><main class="contact-container">
    <div class="logo-header">
        <img src="/images/favicon.png" alt="РАКУРС NEWS">
    </div>
    <h1>Контакты</h1>
    <div class="contact-card">
        <div class="contact-item">
            <span class="contact-label">Город</span>
            <p class="contact-value">Москва</p>
        </div>
        <div class="contact-item"><span class="contact-label">Адрес редакции</span>
            <p class="contact-value">1-й Тверской-Ямской переулок, 9/8</p>
        </div>
        <div class="contact-item">
            <span class="contact-label">Электронная почта</span>
            <p class="contact-value">
                <a href="mailto:info@rakurs-news.ru">rakurs-news@mail.ru</a>
            </p>
        </div>
    </div>
  </main>

</body>
</html>
