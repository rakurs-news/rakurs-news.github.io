<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Загрузка...</title>
    <!-- Рекомендация Яндекса: связь десктопной и мобильной версий -->
    <link rel="alternate" href="https://rakurs-news.github.io/rakurs-news/" media="only screen and (max-width: 600px)">
    <style>
        :root { 
            --bg: #ffffff; 
            --card: #f9f9f9; 
            --text: #1a1a1a; 
            --accent: #ff9800; 
            --meta: #666; 
        } 
        [data-theme="dark"] { 
            --bg: #121212; 
            --card: #1e1e1e; 
            --text: #e0e0e0; 
            --accent: #ff9800; 
            --meta: #aaa; 
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 20px; 
            transition: background 0.3s; 
        }
        header { 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { 
            font-weight: bold; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-size:18px; 
        }
        .controls { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }
        .theme-toggle { 
            cursor: pointer; 
            background: transparent; 
            border: 1px solid var(--accent); 
            color: var(--text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 2px; 
            transition: all 0.3s; 
            height: 32px; 
            width: 32px; 
            padding: 0; 
        }
        .theme-toggle:hover { 
            background: var(--accent); 
            color: #000; 
        }
        .share-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: transparent; 
            border: none; 
            cursor: pointer; 
        }
        .back-btn { 
            display: inline-block; 
            background: transparent; 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 8px 16px; 
            text-decoration: none; 
            font-size: 14px; 
            border-radius: 4px; 
            transition: all 0.3s; 
        }
        .back-btn:hover { 
            background: var(--accent); 
            color: #000; 
        }
        article { 
            max-width: 800px; 
            margin: 0 auto; 
            position: relative; 
        }
        h1 { 
            color: var(--accent); 
            margin-bottom: 15px; 
            line-height: 1.2; /* Уменьшенное межстрочное расстояние */
        }
        .meta { 
            color: var(--meta); 
            font-size: 13px; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
        }
        img.featured-image { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            object-fit: cover; 
        }
        p { 
            font-size: 16px; 
            margin-bottom: 15px; 
        }
        .navigation { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 40px; 
        }

        /* Медиа-запрос для мобильной версии */
        @media (max-width: 768px) {
            h1 {
                line-height: 1.1; /* Еще более уменьшенное межстрочное расстояние для мобильных */
            }
        }

        /* --- Стили для блока "Похожие новости" --- */
        .related-news-section {
            margin: 40px 20px; /* Отступы сверху/снизу и по бокам */
            padding: 20px;
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 8px;
            overflow: hidden; /* Важно для свайпа */
        }

        .related-news-title {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 20px;
            text-align: center;
        }

        .related-news-carousel {
            position: relative;
            width: 100%;
            overflow: hidden; /* Скрываем выходящие за пределы карточки */
            padding: 10px 0; /* Небольшой отступ сверху/снизу */
        }

        .related-news-list {
            display: flex;
            transition: transform 0.5s ease-in-out; /* Плавная анимация свайпа */
            gap: 20px; /* Расстояние между карточками */
            padding-bottom: 10px; /* Для корректного отображения свайпа */
        }

        .related-news-card {
            flex: 0 0 auto; /* Карточки не растягиваются и не сжимаются */
            width: 280px; /* Ширина каждой карточки */
            background: var(--bg); /* Фон карточки, чтобы отличалась от фона секции */
            border: 1px solid var(--meta);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Распределяем контент */
            cursor: grab; /* Указываем, что можно "тащить" */
        }

        .related-news-card.active { /* Стиль для активной карточки, если нужно */
            border-color: var(--accent);
        }

        .related-news-card .meta {
            font-size: 11px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .related-news-card h3 {
            font-size: 16px;
            margin: 0 0 10px 0;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .related-news-card .desc {
            font-size: 13px;
            color: var(--meta);
            margin-top: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 3; /* Больше строк для описания */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Кнопки навигации (опционально, если не хотим только свайп) */
        .carousel-nav {
            text-align: center;
            margin-top: 15px;
        }
        .carousel-nav button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 12px;
            margin: 0 5px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .carousel-nav button:hover {
            background: var(--text);
        }

        /* Медиа-запрос для адаптации карусели */
        @media (max-width: 768px) {
            .related-news-card {
                width: 250px; /* Немного уменьшаем карточки на средних экранах */
            }
        }
        @media (max-width: 500px) {
            .related-news-card {
                width: 90%; /* Карточки занимают почти всю ширину на мобильных */
                margin: 0 auto; /* Центрируем */
            }
            .related-news-carousel {
                padding: 0 10px; /* Добавляем отступы по бокам, чтобы карточки не прилипали к краям */
            }
            .related-news-list {
                gap: 10px; /* Уменьшаем расстояние */
            }
        }
        /* --- Конец стилей для блока "Похожие новости" --- */
    </style>
</head>
<body>
<header>
    <div class="logo">РАКУРС NEWS</div>
    <div class="controls">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Сменить тему">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </div>
</header>
<article>
    <h1 id="article-title">Загрузка новости...</h1>
    <div class="meta">Опубликовано: <span id="article-date">...</span> • Категория: <span id="article-category">...</span></div>
    <div id="article-image-container"></div>
    <div id="article-content"></div>
    
    <!-- Блок "Похожие новости" -->
    <div class="related-news-section" id="relatedNewsSection" style="display: none;">
        <h2 class="related-news-title">Похожие новости</h2>
        <div class="related-news-carousel">
            <div class="related-news-list" id="relatedNewsList">
                <!-- Карточки новостей будут вставлены сюда с помощью JavaScript -->
            </div>
            <!-- Опциональные кнопки навигации -->
            <div class="carousel-nav">
                <button id="prevRelatedBtn" aria-label="Предыдущая новость">&lt;</button>
                <button id="nextRelatedBtn" aria-label="Следующая новость">&gt;</button>
            </div>
        </div>
    </div>
    <!-- КОНЕЦ БЛОКА ПОХОЖИХ НОВОСТЕЙ -->
    
    <div class="navigation">
        <a href="index.html" class="back-btn">← Назад к новостям</a>
        <button class="share-btn" onclick="shareNews()" aria-label="Поделиться новостью">
            <img src="/images/Podelitsya.png" alt="Поделиться" style="width: 24px; height: 24px;">
        </button>
    </div>
</article>

<script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    function shareNews() {
        const newsUrl = window.location.href; // URL текущей страницы
        const newsTitle = document.title; // Заголовок текущей страницы

        // Создаем текст для дележки
        const shareText = `${newsTitle} - ${newsUrl}`;
        
        // Пытаемся использовать Web Share API, если он доступен
        if (navigator.share) {
            navigator.share({
                title: newsTitle,
                url: newsUrl,
            }).then(() => {
                console.log('Успешно поделились');
            }).catch(console.error);
        } else {
            // Если API не поддерживается, открываем окно для дележки через соцсети
            const encodedText = encodeURIComponent(shareText);
            const facebookUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodedText}`;
            const twitterUrl = `https://twitter.com/intent/tweet?text=${encodedText}`;
            const emailUrl = `mailto:?subject=${newsTitle}&body=${encodedText}`;
            
            const shareWindow = window.open(facebookUrl, '_blank'); // Открываем Facebook по умолчанию
            shareWindow.focus();
        }
    }

    // --- Глобальная переменная для хранения всех новостей ---
    let allNews = []; 
    // --- ID главной новости (если есть) ---
    let featuredNewsId = null; 

    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
            console.error("ID новости не найден в URL.");
            document.getElementById('article-title').textContent = "Ошибка: ID новости не указан";
            return; 
        }

        fetch('news.json')
            .then(res => {
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }
                return res.json();
            })
            .then(data => {
                allNews = data; // Сохраняем все новости в глобальную переменную
                // featuredNewsId = allNews.featuredNewsId; // Если featuredNewsId хранится в news.json

                const newsItem = allNews.find(item => String(item.id) === String(id));
                if (newsItem) {
                    document.getElementById('article-title').textContent = newsItem.title;
                    document.getElementById('page-title').textContent = newsItem.title + ' — Ракурс NEWS';
                    document.getElementById('article-date').textContent = newsItem.date;
                    document.getElementById('article-category').textContent = newsItem.category;
                    document.getElementById('article-content').innerHTML = newsItem.content;
                    if (newsItem.image) {
                        document.getElementById('article-image-container').innerHTML = `<img src="${newsItem.image}" alt="${newsItem.title}" class="featured-image">`;
                    }
                    
                    // --- Вызов функции для рендеринга похожих новостей ---
                    renderRelatedNews(); 
                } else {
                    // Новость с указанным ID не найдена
                    document.getElementById('article-title').textContent = "Новость не найдена";
                    document.getElementById('article-date').textContent = "";
                    document.getElementById('article-category').textContent = "";
                    document.getElementById('article-content').innerHTML = "<p>Извините, новость по указанному ID не существует.</p>";
                }
            })
            .catch(error => {
                console.error('Ошибка загрузки или обработки новостей:', error);
                document.getElementById('article-title').textContent = "Ошибка загрузки";
                document.getElementById('article-content').innerHTML = `<p>Не удалось загрузить новость. Попробуйте позже. Ошибка: ${error.message}</p>`;
            });
    });

    // --- Логика для блока "Похожие новости" ---
    let relatedNewsIndex = 0;
    let relatedNewsList;
    let relatedNewsSection;
    let prevRelatedBtn;
    let nextRelatedBtn;
    let isDragging = false;
    let startX = 0;
    let currentX = 0;
    let cardWidth = 0;
    let gapWidth = 0;

    function renderRelatedNews() {
        relatedNewsList = document.getElementById('relatedNewsList');
        relatedNewsSection = document.getElementById('relatedNewsSection');
        prevRelatedBtn = document.getElementById('prevRelatedBtn');
        nextRelatedBtn = document.getElementById('nextRelatedBtn');

        if (!allNews || allNews.length === 0 || !relatedNewsList || !relatedNewsSection) {
            if (relatedNewsSection) relatedNewsSection.style.display = 'none';
            return;
        }

        // Получаем ID текущей просматриваемой новости
        const currentArticleId = new URLSearchParams(window.location.search).get('id');
        
        // Фильтруем новости: исключаем текущую новость и главную новость (если она есть)
        let relatedNews = allNews.filter(item => String(item.id) !== String(currentArticleId) && item.id != featuredNewsId);
        
        // Ограничиваем количество похожих новостей (например, 5)
        relatedNews = relatedNews.slice(0, 5); 

        if (relatedNews.length === 0) {
            relatedNewsSection.style.display = 'none';
            return;
        }

        relatedNewsSection.style.display = 'block'; // Показываем секцию, если есть новости

        relatedNewsList.innerHTML = relatedNews.map(item => `
            <div class="related-news-card">
                <div>
                    <span class="meta">${item.category} • ${item.date}</span>
                    <h3>${item.title}</h3>
                    <div class="desc">${item.description || ''}</div>
                </div>
                <a href="article.html?id=${item.id}" class="back-btn" style="margin-top: 15px; text-decoration: none; display: inline-block;">Читать далее</a>
            </div>
        `).join('');

        // Инициализация карусели
        setupCarousel();
    }

    function setupCarousel() {
        const cards = relatedNewsList.querySelectorAll('.related-news-card');
        if (cards.length === 0) return;

        // Рассчитываем ширину карточки и отступ
        const computedStyle = getComputedStyle(relatedNewsList);
        gapWidth = parseInt(computedStyle.gap);
        cardWidth = cards[0].offsetWidth + gapWidth; // Ширина карточки + отступ
        
        updateCarousel(); // Первоначальное обновление состояния
        setupCarouselNavigation(cards); // Настройка навигации и свайпа
    }

    function updateCarousel() {
        const cards = relatedNewsList.querySelectorAll('.related-news-card');
        if (cards.length === 0) return;

        const offset = -relatedNewsIndex * cardWidth;
        relatedNewsList.style.transform = `translateX(${offset}px)`;

        // Обновляем состояние кнопок навигации
        prevRelatedBtn.disabled = relatedNewsIndex === 0;
        nextRelatedBtn.disabled = relatedNewsIndex === cards.length - 1;
    }

    function setupCarouselNavigation(cards) {
        // Обработчики для кнопок навигации
        prevRelatedBtn.addEventListener('click', () => {
            if (relatedNewsIndex > 0) {
                relatedNewsIndex--;
                updateCarousel();
            }
        });

        nextRelatedBtn.addEventListener('click', () => {
            if (relatedNewsIndex < cards.length - 1) {
                relatedNewsIndex++;
                updateCarousel();
            }
        });

        // Обработка свайпа (простая реализация)
        let isDown = false;
        let startX_swipe;
        let scrollLeft_swipe;

        relatedNewsList.addEventListener('mousedown', (e) => {
            isDown = true;
            relatedNewsList.classList.add('active');
            startX_swipe = e.pageX - relatedNewsList.offsetLeft;
            scrollLeft_swipe = relatedNewsList.scrollLeft;
            relatedNewsList.style.cursor = 'grabbing';
            relatedNewsList.style.transition = 'none'; // Отключаем transition для плавного перетаскивания
        });

        relatedNewsList.addEventListener('mouseleave', () => {
            isDown = false;
            relatedNewsList.classList.remove('active');
            relatedNewsList.style.cursor = 'grab';
            relatedNewsList.style.transition = 'transform 0.5s ease-in-out'; // Возвращаем transition
        });

        relatedNewsList.addEventListener('mouseup', () => {
            isDown = false;
            relatedNewsList.classList.remove('active');
            relatedNewsList.style.cursor = 'grab';
            relatedNewsList.style.transition = 'transform 0.5s ease-in-out'; // Возвращаем transition
        });

        relatedNewsList.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - relatedNewsList.offsetLeft;
            const walk = (x - startX_swipe) * 1.5; // Множитель для скорости свайпа
            relatedNewsList.scrollLeft = scrollLeft_swipe - walk;
        });

        // Обработка касаний для мобильных устройств
        relatedNewsList.addEventListener('touchstart', (e) => {
            isDown = true;
            startX_swipe = e.touches[0].clientX;
            scrollLeft_swipe = relatedNewsList.scrollLeft;
            relatedNewsList.style.transition = 'none';
        });

        relatedNewsList.addEventListener('touchmove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.touches[0].clientX;
            const walk = (x - startX_swipe) * 1.5; // Множитель для скорости свайпа
            relatedNewsList.scrollLeft = scrollLeft_swipe - walk;
        });

        relatedNewsList.addEventListener('touchend', () => {
            isDown = false;
            relatedNewsList.style.transition = 'transform 0.5s ease-in-out'; // Возвращаем transition
        });
        
        // Обновляем кнопки навигации при изменении размера окна
        window.addEventListener('resize', () => {
            // Пересчитываем ширину карточек и обновляем позицию
            const cards = relatedNewsList.querySelectorAll('.related-news-card');
            if (cards.length > 0) {
                 const computedStyle = getComputedStyle(relatedNewsList);
                 gapWidth = parseInt(computedStyle.gap);
                 cardWidth = cards[0].offsetWidth + gapWidth;
                 const offset = -relatedNewsIndex * cardWidth;
                 relatedNewsList.style.transform = `translateX(${offset}px)`;
            }
            updateCarousel(); // Обновляем состояние кнопок
        });
    }
</script>
</body>
</html>
