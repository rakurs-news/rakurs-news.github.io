<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Загрузка...</title>
    <style>
        :root { 
            --bg: #ffffff; 
            --card: #f9f9f9; 
            --text: #1a1a1a; 
            --accent: #ff9800; 
            --meta: #666; 
        } 
        [data-theme="dark"] { 
            --bg: #121212; 
            --card: #1e1e1e; 
            --text: #e0e0e0; 
            --accent: #ff9800; 
            --meta: #aaa; 
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 20px; 
            transition: background 0.3s; 
        }
        header { 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { 
            font-weight: bold; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-size:18px; 
        }
        .controls { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
        }
        .theme-toggle { 
            cursor: pointer; 
            background: transparent; 
            border: 1px solid var(--accent); 
            color: var(--text); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 2px; 
            transition: all 0.3s; 
            height: 32px; 
            width: 32px; 
            padding: 0; 
        }
        .theme-toggle:hover { 
            background: var(--accent); 
            color: #000; 
        }
        .share-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: transparent; 
            border: none; 
            cursor: pointer; 
        }
        .back-btn { 
            display: inline-block; 
            background: transparent; 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 8px 16px; 
            text-decoration: none; 
            font-size: 14px; 
            border-radius: 4px; 
            transition: all 0.3s; 
        }
        .back-btn:hover { 
            background: var(--accent); 
            color: #000; 
        }
        article { 
            max-width: 800px; 
            margin: 0 auto; 
            position: relative; 
        }
        h1 { 
            color: var(--accent); 
            margin-bottom: 15px; 
            line-height: 1.2; /* Уменьшенное межстрочное расстояние */
        }
        .meta { 
            color: var(--meta); 
            font-size: 13px; 
            margin-bottom: 25px; 
            text-transform: uppercase; 
        }
        img.featured-image { 
            width: 100%; 
            height: auto; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            object-fit: cover; 
        }
        p { 
            font-size: 16px; 
            margin-bottom: 15px; 
        }
        .navigation { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 40px; 
        }

        /* Медиа-запрос для мобильной версии */
        @media (max-width: 768px) {
            h1 {
                line-height: 1.1; /* Еще более уменьшенное межстрочное расстояние для мобильных */
            }
        }
    </style>
</head>
<body>
<header>
    <div class="logo">РАКУРС NEWS</div>
    <div class="controls">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Сменить тему">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </button>
    </div>
</header>
<article>
    <h1 id="article-title">Загрузка новости...</h1>
    <div class="meta">Опубликовано: <span id="article-date">...</span> • Категория: <span id="article-category">...</span></div>
    <div id="article-image-container"></div>
    <div id="article-content"></div>
    
    <div class="navigation">
        <a href="index.html" class="back-btn">← Назад к новостям</a>
        <button class="share-btn" onclick="shareNews()" aria-label="Поделиться новостью">
            <img src="/images/Podelitsya.png" alt="Поделиться" style="width: 24px; height: 24px;">
        </button>
    </div>
</article>

<script>
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    }

    function shareNews() {
        const newsUrl = window.location.href; // URL текущей страницы
        const newsTitle = document.title; // Заголовок текущей страницы

        // Создаем текст для дележки
        const shareText = `${newsTitle} - ${newsUrl}`;
        
        // Пытаемся использовать Web Share API, если он доступен
        if (navigator.share) {
            navigator.share({
                title: newsTitle,
                url: newsUrl,
            }).then(() => {
                console.log('Успешно поделились');
            }).catch(console.error);
        } else {
            // Если API не поддерживается, открываем окно для дележки через соцсети
            const encodedText = encodeURIComponent(shareText);
            const facebookUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodedText}`;
            const twitterUrl = `https://twitter.com/intent/tweet?text=${encodedText}`;
            const emailUrl = `mailto:?subject=${newsTitle}&body=${encodedText}`;
            
            const shareWindow = window.open(facebookUrl, '_blank'); // Открываем Facebook по умолчанию
            shareWindow.focus();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) return;

        fetch('news.json')
            .then(res => res.json())
            .then(data => {
                const newsItem = data.find(item => String(item.id) === String(id));
                if (newsItem) {
                    document.getElementById('article-title').textContent = newsItem.title;
                    document.getElementById('page-title').textContent = newsItem.title + ' — Ракурс NEWS';
                    document.getElementById('article-date').textContent = newsItem.date;
                    document.getElementById('article-category').textContent = newsItem.category;
                    document.getElementById('article-content').innerHTML = newsItem.content;
                    if (newsItem.image) {
                        document.getElementById('article-image-container').innerHTML = `<img src="${newsItem.image}" alt="${newsItem.title}" class="featured-image">`;
                    }
                }
            });
    });
</script>
</body>
</html>
