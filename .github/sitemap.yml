name: Update Sitemap

on:
push:
paths:- 'news.json'

jobs:
build:
runs-on: ubuntu-latestpermissions:
contents: write
steps:
- name: Checkout code
uses: actions/checkout@v3

- name: Setup Node.js
uses: actions/setup-node@v3
with:
node-version: '16'

- name: Run sitemap generator
run: node generate_sitemap.js

- name: Commit and push sitemap
run: |
git config --global user.name 'github-actions[bot]'
git config --global user.email 'github-actions[bot]@users.noreply.github.com'
git add sitemap.xml
git diff --quiet && git diff --staged --quiet || (git commit -m "Автоматическое обновление sitemap.xml" && git push)
