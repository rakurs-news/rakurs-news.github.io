```yaml
name: Check IPTV

on:
schedule:
- cron: '0 0 * * *' # Запуск каждый день в полночь
workflow_dispatch: # Позволяет запускать проверку вручную

jobs:
check:
runs-on: ubuntu-latest
steps:
- name: Checkout repository
uses: actions/checkout@v3
- name: Install Python
uses: actions/setup-python@v2
with:
python-version: '3.8'
- name: Run M3U Checker
run: |
pip install m3u-checker # Установите нужный пакет для проверки
m3u-checker CAPMAT.m3u # Здесь будет ваша команда для проверки
```
